name: Publish to npm

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Check package contents
        run: |
          npm pack --dry-run --json > pack.json

          node <<'NODE'
          const fs = require("fs");

          const [{ files }] = JSON.parse(fs.readFileSync("pack.json", "utf8"));
          const allowedFiles = new Set([
            "cli.js",
            "dist/index.html",
            "dist/main.js",
            "dist/preload.js",
            "dist/renderer.js",
            "dist/styles.css",
            "LICENSE",
            "package.json",
            "README.md",
          ]);
          const actualFiles = files.map((file) => file.path);
          const unexpectedFiles = actualFiles.filter((file) => !allowedFiles.has(file));

          if (unexpectedFiles.length > 0) {
            console.error("Unexpected files in npm package:");
            for (const file of unexpectedFiles) {
              console.error(`- ${file}`);
            }
            process.exit(1);
          }

          console.log("Package contents are limited to the expected files:");
          for (const file of actualFiles) {
            console.log(`- ${file}`);
          }
          NODE

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
