<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Profile Switcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col h-screen border border-gray-200">

    <div class="drag-region bg-white flex justify-between items-center px-3 py-2.5 border-b border-gray-200">
        <span class="font-semibold text-sm tracking-tight text-gray-900">Claude Code Profile Switcher</span>
        <button onclick="window.api.closeWindow()" class="no-drag text-gray-400 hover:text-gray-600 font-semibold px-1 transition-colors leading-none text-lg">×</button>
    </div>

    <div class="p-4 flex-1 flex flex-col gap-3 overflow-y-auto">
        <div class="relative z-20">
            <label class="block text-xs text-gray-600 mb-1 font-medium flex justify-between">
                <span>Provider</span>
                <span id="activeEnvLabel" class="text-xs text-blue-600 font-medium hidden">Active Env Saved</span>
            </label>
            <div class="relative">
                <input type="text" id="providerSearch" class="no-drag w-full px-2.5 py-1.5 rounded text-sm" placeholder="Search Provider..." autocomplete="off">
                <div id="providerDropdown" class="no-drag absolute w-full mt-1 bg-white border border-gray-200 rounded shadow-lg max-h-40 overflow-y-auto hidden z-50">
                    <ul id="providerList" class="py-1"></ul>
                </div>
            </div>
        </div>

        <div class="relative z-10">
            <label class="block text-xs text-gray-600 mb-1 font-medium">Model</label>
            <div class="relative">
                <input type="text" id="modelSearch" class="no-drag w-full px-2.5 py-1.5 rounded text-sm" placeholder="Select or type Model..." autocomplete="off">
                <div id="modelDropdown" class="no-drag absolute w-full mt-1 bg-white border border-gray-200 rounded shadow-lg max-h-64 overflow-y-auto hidden z-50">
                    <ul id="modelList" class="py-1"></ul>
                </div>
                <div id="modelLoading" class="absolute inset-y-0 right-0 flex items-center pr-2.5 pointer-events-none hidden">
                    <span class="animate-pulse text-xs text-gray-400">...</span>
                </div>
            </div>
            
            <div id="modelInfo" class="mt-1.5 text-xs text-gray-600 hidden flex gap-1 whitespace-nowrap">
                <span>In: <span id="infoInputPrice" class="text-gray-900 font-medium">-</span></span>
                <span>|</span>
                <span>Out: <span id="infoOutputPrice" class="text-gray-900 font-medium">-</span></span>
                <span>|</span>
                <span>Ctx: <span id="infoContext" class="text-gray-900 font-medium">-</span></span>
            </div>
        </div>

        <div>
            <label class="block text-xs text-gray-600 mb-1 font-medium">BASE_URL</label>
            <input type="text" id="baseUrlInput" class="no-drag w-full px-2.5 py-1.5 rounded text-sm" placeholder="https://api.example.com">
        </div>

        <div>
            <label class="block text-xs text-gray-600 mb-1 font-medium">AUTH_TOKEN</label>
            <input type="text" id="tokenInput" class="no-drag w-full px-2.5 py-1.5 rounded text-sm" placeholder="Enter your API token">
        </div>

        <div>
            <label class="block text-xs text-gray-600 mb-1 font-medium">CUSTOM_HEADERS</label>
            <input type="text" id="headersInput" class="no-drag w-full px-2.5 py-1.5 rounded text-sm" placeholder="Key: Value">
        </div>
    </div>

    <div class="px-4 pb-4 flex flex-col gap-2">
        <div class="flex gap-2">
            <button id="resetBtn" class="no-drag w-[40%] border border-red-300 bg-red-50 hover:bg-red-100 text-red-700 font-semibold py-2 px-1 text-[11px] rounded transition-all cursor-pointer active:bg-red-200">
                Reset to Default
            </button>
            <button id="loadBtn" class="no-drag w-[60%] border border-blue-300 bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold py-2 px-2.5 text-sm rounded transition-all cursor-pointer active:bg-blue-200">
                Save Profile
            </button>
        </div>

        <div id="statusMessage" class="text-xs text-center hidden min-h-[18px]"></div>

        <div class="border-t border-gray-200 pt-2 flex justify-between text-xs text-gray-500">
            <a href="https://www.bariskisir.com" target="_blank" class="no-drag hover:text-gray-700 transition-colors">Created by Barış Kısır</a>
            <a href="https://github.com/bariskisir/ClaudeCodeProfileSwitcher" target="_blank" class="no-drag hover:text-gray-700 transition-colors">Source</a>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
